<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="../css/register.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=visibility" />
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>

</head>
<body>
    <div id="registerForm">
        <h2>Đăng ký tài khoản</h2>
        <div class="inputForm">
            <form id="formContent">
                <div>
                    <input id="registerName" type="text" placeholder= "Tên đăng khoản">
                </div>
                <div class="passwordBox">
                    <input id="password" type="password" placeholder= "Mật khẩu">
                    <span class="material-symbols-outlined eyeIcon-1">
                        visibility
                    </span>
                </div>
                <div class="passwordBox">
                    <input id="passwordConfirm" type="password" placeholder= "Xác nhận mật khẩu">
                    <span class="material-symbols-outlined eyeIcon-2">
                        visibility
                    </span>
                </div>
                <button id="btn-register" type="submit">Đăng ký</button>
            </form>
        </div>
        <div class="otherInput">
            <span>Đã có tài khoản?</span>
            <a id="registerNow" href="./login.html">Đăng nhập</a>
        </div>
    </div>
    <script src="../js/register.js"></script>
</body>
</html>
